<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Stock Chatbot</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f7f7f7;
      padding-top: 50px;
    }
    .chat-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 20px;
    }
    .chat-box {
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background-color: #f1f1f1;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .chat-message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 20px;
      display: inline-block;
    }
    .user-message {
      background-color: #007bff;
      color: white;
      float: right;
      clear: both;
    }
    .bot-message {
      background-color: #e9e9e9;
      float: left;
      clear: both;
    }
    .chat-input {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container chat-container">
  <div class="chat-box" id="chatBox"></div>
  <div class="chat-input">
    <input type="text" class="form-control" id="userInput" placeholder="Type something...">
    <button class="btn btn-primary mt-2" onclick="processInput()">Send</button>
  </div>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');

// 🏦 Dictionary of companies and stock symbols
const companySymbols = {
  "infosys": "INFY.BSE",
  "tcs": "TCS.BSE",
  "wipro": "WIPRO.BSE",
  "hcl tech": "HCLTECH.BSE",
  "tech mahindra": "TECHM.BSE",
  "reliance": "RELIANCE.BSE",
  "hdfc bank": "HDFCBANK.BSE",
  "icici bank": "ICICIBANK.BSE",
  "sbi": "SBIN.BSE",
  "lt": "LT.BSE"
};

// 📊 Sectors
const sectorMap = {
  "it sector": ["infosys", "tcs", "wipro", "hcl tech", "tech mahindra"],
  "banking sector": ["hdfc bank", "icici bank", "sbi"],
  "energy sector": ["reliance"],
  "pharma sector": ["sun pharma", "dr reddy", "cipla"] // sample, not mapped in companySymbols yet
};

// 💰 Funds (sample data, since Alpha Vantage doesn’t support Indian MFs directly)
const funds = {
  "nifty 50 index fund": { nav: "₹220", returns: "12% (1Y)" },
  "hdfc equity fund": { nav: "₹670", returns: "15% (1Y)" },
  "sbi bluechip fund": { nav: "₹410", returns: "11% (1Y)" },
  "icici tech fund": { nav: "₹120", returns: "18% (1Y)" }
};

// Function to append messages
function appendMessage(text, sender) {
  const messageElement = document.createElement('div');
  messageElement.classList.add('chat-message', sender === 'user' ? 'user-message' : 'bot-message');
  messageElement.innerHTML = text;
  chatBox.appendChild(messageElement);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Fetch stock data from Alpha Vantage
async function getStockData(symbol) {
  const apiKey = "YOUR_API_KEY_HERE";// ✅ Your API key
  const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${apiKey}`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    const stock = data["Global Quote"];
    if (stock && stock["05. price"]) {
      return `
        <b>${symbol} Stock Details:</b><br>
        Price: ₹${stock["05. price"]}<br>
        Change: ${stock["09. change"]}<br>
        Percent Change: ${stock["10. change percent"]}
      `;
    } else {
      return "⚠️ No data found for this stock.";
    }
  } catch (error) {
    return "❌ Error fetching stock data. Try again later.";
  }
}

// Chatbot logic
async function handleResponse(input) {
  let response = '';
  input = input.toLowerCase();

  // 👋 Greetings
  if (input.includes("hi") || input.includes("hello") || input.includes("hey")) {
    response = `
      👋 Hi there! Welcome to StockBot.<br>
      You can ask me about:<br>
      - "stocks"<br>
      - "sectors"<br>
      - "funds"
    `;
    appendMessage(response, 'bot');

  } else if (input.includes("stocks")) {
    response = "📈 Available stocks:<br>" + Object.keys(companySymbols).join(", ");
    appendMessage(response, 'bot');

  } else if (input.includes("sectors")) {
    response = "🏭 Available sectors:<br>" + Object.keys(sectorMap).join(", ");
    appendMessage(response, 'bot');

  } else if (input.includes("funds")) {
    response = "💰 Available funds:<br>" + Object.keys(funds).join(", ");
    appendMessage(response, 'bot');

  } else if (funds[input]) {
    const f = funds[input];
    response = `<b>${input}</b><br> NAV: ${f.nav}<br> Returns: ${f.returns}`;
    appendMessage(response, 'bot');

  } else if (sectorMap[input]) {
    response = `📊 ${input} includes:<br>` + sectorMap[input].join(", ");
    appendMessage(response, 'bot');

  } else {
    // Check if company exists
    let found = false;
    for (let company in companySymbols) {
      if (input.includes(company)) {
        response = await getStockData(companySymbols[company]);
        appendMessage(response, 'bot');
        found = true;
        break;
      }
    }
    if (!found) {
      response = "⚠️ Sorry, I don’t recognize that. Try typing 'stocks', 'sectors', or 'funds'.";
      appendMessage(response, 'bot');
    }
  }
}

// Process input
function processInput() {
  const input = userInput.value.trim();
  if (input) {
    appendMessage(input, 'user');
    handleResponse(input);
    userInput.value = '';
  }
}

// Greeting at start
appendMessage("🤖 Hello! I'm your Stock Chatbot. Say 'hi' to begin!", 'bot');

// Enter key support
userInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') processInput();
});
</script>

</body>
</html>
